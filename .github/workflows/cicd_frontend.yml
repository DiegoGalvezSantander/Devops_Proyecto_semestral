name: cicd_frontend

on:
 push:
  branches: [ "deploy" ] 
  workflow_dispatch:
  paths:
   - "front_despacho/**" 


jobs:
 build-push-deploy-frontend:
  runs-on: ubuntu-latest


  steps:
  - name: Checkout código
   uses: actions/checkout@v3


  - name: Configurar credenciales AWS
   uses: aws-actions/configure-aws-credentials@v4
   with:
    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
    aws-region: ${{ secrets.AWS_REGION }}


  - name: Login en Amazon ECR
   uses: aws-actions/amazon-ecr-login@v1


  - name: Build imagen Frontend y push a ECR
   run: |
    cd front_despacho
    docker build -t innovatech-frontend .
    docker tag innovatech-frontend:latest ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest
    docker push ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest


  - name: Desplegar Frontend vía SSM
   run: |
    aws ssm send-command \
     --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
     --document-name "AWS-RunShellScript" \
     --comment "Actualizar front_despacho desde ECR" \
     --parameters '{"commands":[
      "set -e",
      "aws ecr get-login-password --region '${{ secrets.AWS_REGION }}' | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
      "docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest",
      "docker stop front-innovatech || true",
      "docker rm front-innovatech || true",
      "docker run -d --name front-innovatech -p 80:80 ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest"
     ]}' \

     --output text